<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALMoazin</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="app">

        <header>

            <div class="top-bar">

                <div class="left">
                    🔊
                </div>

                <div class="center">
                    <h1>ALMoazin</h1>
                </div>

                <div class="right">
                    ⚙️
                </div>

            </div>

        </header>

        <section class="date-card">

            <h2 id="dayName">Sunday</h2>

            <h3 id="dateNow">5 July 2026</h3>

            <p id="hijriDate">...</p>

        </section>

        <section class="next-prayer">

            <h2>الصلاة القادمة</h2>

            <h1 id="nextPrayer">الفجر</h1>

            <h3 id="countdown">00:00:00</h3>

        </section>

        <section class="compass">

            <div class="circle">

                <div id="needle"></div>

            </div>

        </section>

        <section class="times">

            <div class="card">
                <span>الفجر</span>
                <strong id="fajr">--:--</strong>
            </div>

            <div class="card">
                <span>الشروق</span>
                <strong id="sunrise">--:--</strong>
            </div>

            <div class="card">
                <span>الظهر</span>
                <strong id="dhuhr">--:--</strong>
            </div>

            <div class="card">
                <span>العصر</span>
                <strong id="asr">--:--</strong>
            </div>

            <div class="card">
                <span>المغرب</span>
                <strong id="maghrib">--:--</strong>
            </div>

            <div class="card">
                <span>العشاء</span>
                <strong id="isha">--:--</strong>
            </div>

        </section>

        <footer>

            <div id="city">
                📍 جاري تحديد الموقع...
            </div>

        </footer>

    </div>

    <script src="app.js"></script>

</body>

</html>
