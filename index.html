<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prayer Pro</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="quran.css">
<link rel="stylesheet" href="azkar.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

</head>


<body>


<div class="container">


<!-- الهيدر -->

<header class="header">

<button class="icon-btn" onclick="openMenu()">
☰
</button>


<h1 class="logo">
🕌 Prayer Pro
</h1>


<button class="icon-btn" id="settingsBtn">
⚙️
</button>

</header>



<!-- قائمة الأذكار -->

<div id="menu" class="menu">


<button onclick="openAzkar()">
🌅 أذكار الصباح
</button>


<button onclick="openAzkar()">
🌙 أذكار المساء
</button>


<button onclick="openAzkar()">
😴 أذكار النوم
</button>


<button onclick="openAzkar()">
🤲 أذكار بعد الصلاة
</button>


<button onclick="openQuran()">
📖 القرآن الكريم
</button>


</div>





<!-- التاريخ -->

<section class="date-card">

<h2 id="dayName">
اليوم
</h2>


<p id="gregorianDate">
جارٍ التحميل...
</p>


<p id="hijriDate">
جارٍ التحميل...
</p>


</section>





<!-- البوصلة -->

<section class="compass-section">


<div class="compass">

<div class="compass-ring"></div>

<div id="needle"></div>

<div class="center-dot"></div>


</div>


<h3 id="qiblaDirection">
اتجاه القبلة
</h3>


</section>





<!-- السبحة -->

<section class="tasbih-section">


<h2>
📿 السبحة الإلكترونية
</h2>


<div id="counter">
0
</div>


<div class="tasbih-buttons">


<button onclick="increaseTasbih()">
+ تسبيح
</button>


<button onclick="resetTasbih()">
إعادة
</button>


</div>


</section>







<!-- الصلاة القادمة -->

<section class="next-prayer">


<h2>
الصلاة القادمة
</h2>


<h1 id="nextPrayer">
جارٍ التحميل...
</h1>


<h2 id="countdown">
00:00:00
</h2>


</section>







<!-- مواقيت الصلاة -->

<section class="times">


<div class="time-card">

<span>
الفجر
</span>

<strong id="fajr">
--:--
</strong>

</div>



<div class="time-card">

<span>
الشروق
</span>

<strong id="sunrise">
--:--
</strong>

</div>



<div class="time-card">

<span>
الظهر
</span>

<strong id="dhuhr">
--:--
</strong>

</div>



<div class="time-card">

<span>
العصر
</span>

<strong id="asr">
--:--
</strong>

</div>



<div class="time-card">

<span>
المغرب
</span>

<strong id="maghrib">
--:--
</strong>

</div>



<div class="time-card">

<span>
العشاء
</span>

<strong id="isha">
--:--
</strong>

</div>



</section>






<footer class="footer">

<p id="cityName">
📍 جاري تحديد الموقع...
</p>


</footer>


</div>







<!-- نافذة القرآن -->

<div id="quranModal" class="quran-modal">


<div class="quran-content">


<span class="close" onclick="closeQuran()">
✖
</span>


<h2>
📖 القرآن الكريم
</h2>


<div id="surahList">
جاري تحميل السور...
</div>



</div>


</div>







<script src="app.js"></script>

<script src="azkar.js"></script>

<script src="qibla.js"></script>

<script src="settings.js"></script>

<script src="quran-data.js"></script>

<script src="quran.js"></script>


</body>

</html>
